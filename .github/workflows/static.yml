name: Deploy Life Sync

on:
  push:
  
  permissions:
  contents: read
  pages: write
  id-token: write
  
  
    branches: ["main", "versao-estavel"] # Protege as duas rotas que você usou

# ISSO AQUI É O QUE LIMPA A FILA AUTOMATICAMENTE 👇
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
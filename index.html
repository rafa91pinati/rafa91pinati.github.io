<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minha Agenda Inteligente - v4.3.6</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div id="telaLogin" class="modal">    <div class="modal-content">        <h2 style="text-align:center;">Agenda v4.3.5</h2>        <input type="email" id="emailLogin" placeholder="Seu e-mail">        <input type="password" id="senhaLogin" placeholder="Sua senha">        <button onclick="fazerLogin()" style="background:#007bff; color:white; border:none; padding:15px; width:100%; border-radius:8px; font-weight:bold; margin-top:10px; cursor:pointer;">Entrar</button>        <button onclick="criarConta()" style="background:none; color:#007bff; border:none; width:100%; margin-top:10px; cursor:pointer;">Criar nova conta</button>    </div></div><div class="container">    <div class="timeline-header">        <button class="btn-date ativo" id="btnHoje" onclick="setarData('hoje', this)">Hoje</button>        <button class="btn-date" id="btnAmanha" onclick="setarData('amanha', this)">Amanhã</button>        <button class="btn-date" id="btnSemana" onclick="setarData('semana', this)">Semana</button>        <input type="date" id="dataSeletor" onchange="setarData('custom', this)">        <button onclick="abrirConfig()" style="background:none; border:none; font-size:1.4rem; cursor:pointer; color:#ccd0d5;">⚙️</button>    </div>    <div class="category-tabs" id="listaCategorias">Sincronizando...</div>    <div style="display: flex; align-items: center; gap: 10px; margin: 0 5px 20px 5px; padding: 12px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);">        <div style="flex: 1; display: flex; align-items: center; gap: 5px;">            <span style="font-weight: 800; font-size: 0.65rem; color: #64748b; text-transform: uppercase;">Tag:</span>            <select id="filtroTagGlobal" onchange="selecionarTag(this.value)" style="flex: 1; padding: 6px; border-radius: 8px; border: none; background: rgba(255,255,255,0.8); color: #1e293b; font-weight: 700; outline: none; cursor: pointer;">                <option value="">Todas</option>            </select>        </div>    </div>    <div class="header-secao" onclick="toggleSecao('secaoAdd', 'setaAdd')">        <span style="display: flex; align-items: center; gap: 10px;">            <div class="icone-quadrado"></div> ADD TAREFA        </span>        <span id="setaAdd" class="seta-secao">▼</span>    </div>        <div id="secaoAdd" class="secao-card escondido">        <input type="text" id="descTask" placeholder="O que agendar hoje?">        <div id="previewFotosNovas" class="container-fotos"></div>        <div class="grid-50">            <input type="time" id="horaTask">            <button class="btn-acao-edit btn-arquivo-azul" onclick="document.getElementById('fotoTask').click()">📷 ARQUIVO</button>            <input type="file" id="fotoTask" class="escondido" accept="image/*" multiple onchange="prepararFotosNovas(this)">        </div>        <div class="grid-50" style="margin-top: 15px;">            <div>                <label style="font-size: 0.65rem; font-weight: 800; color: #64748b;">REPETIR:</label>                <select id="tipoRecorrencia">                    <option value="nenhuma">Sem recorrência</option>                    <option value="diario">Diário</option>                    <option value="semanal">Semanal</option>                </select>            </div>            <div>                <label style="font-size: 0.65rem; font-weight: 800; color: #64748b;">ATÉ DIA:</label>                <input type="date" id="dataFimRecorrencia">            </div>        </div>        <div style="display: flex; gap: 10px; margin-top: 15px;">            <button onclick="cancelarNovaTarefa()" style="flex:1;">Cancelar</button>            <button id="btnSalvar" onclick="salvarNovaTarefa()" style="flex:1; background: #2563eb; color: white;">Salvar</button>        </div>    </div>    <div class="header-secao" onclick="toggleSecao('secaoArquivos', 'setaArq')">        <span style="display: flex; align-items: center; gap: 10px;">            <div class="icone-quadrado"></div> ARQUIVOS FIXOS        </span>        <span id="setaArq" class="seta-secao">▼</span>    </div>    <div id="secaoArquivos" class="secao-card escondido">        <input type="text" id="nomeArquivoFixo" placeholder="Descrição do arquivo">        <div class="grid-50">            <input type="file" id="inputArquivoFixo">            <button id="btnSubirFixo" onclick="subirArquivoFixo()">Subir</button>        </div>        <div id="listaArquivosFixos"></div>    </div>    <div class="header-secao">        <div onclick="toggleSecao('listaTarefas', 'setaLista')" style="flex: 1;">            <div class="icone-quadrado"></div> ATIVIDADES <span id="setaLista" class="seta-secao seta-expandida">▼</span>        </div>        <div>            <button onclick="abrirCronogramaVisual(event)">📊 Gráfico</button>            <button onclick="gerarRelatorioPDF(event)">📄 PDF</button>        </div>    </div>        <div id="listaTarefas">Carregando atividades...</div></div><script type="module" src="app.js"></script></body></html>

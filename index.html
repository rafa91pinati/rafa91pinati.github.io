<div id="modalArquivos" class="modal-overlay escondido">

</div>

                <button id="btnSalvarFinanceiro" onclick="adicionarTransacao()" style="background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);">ADICIONAR</button>

            </div>



            <div id="listaFinanceiro" style="margin-top:10px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 15px; max-height: 250px; overflow-y: auto;"></div>

        </div>

    </div>
